# Terminal UI theme

# default theme, using shades of blue

# display height repartition between list of diff and content of one diff
fill_factor_list: 1
fill_factor_content: 3

# default style for all content
content:
  fg: "#BDBDBD" # md2.gray.400
  bg: "#000000"

bar:
  # base style for bars, headers, separators
  base:
    fg: "#FFFFFF"
    bg: "#0277BD" # md2.light_blue.800
  # main title style
  title:
    effect: bold
  # style for key strokes
  key_stroke:
    fg: "#FFD54F" # md2.amber.300
  # style for active view (F5/F6/F7)
  active_view:
    bg: "#039BE5" # md2.light_blue.600

main:
  selected_item:
    fg: "#EEEEEE" # md2.gray.200
    bg: "#01579B" # md2.light_blue.900
  scroll_bar:
    fg: "#0288D1" # md2.light_blue.700
  # highlight sync action in diff list
  sync_resolved:
    fg: "#00E676" # md2.green.A400
    effect: bold
  # highlight sync conflict in diff list
  sync_conflict:
    fg: "#E040FB" # md2.purple.A200
    effect: bold

help:
  border_style:
    fg: "#FF9800" # md2.orange.500
    bg: "#000000"
  border_type: rounded
  key_stroke:
    fg: "#FFD54F" # md2.amber.300
  highlight:
    fg: "#FFFFFF"

confirm_exit:
  border_style:
    fg: "#FF9800" # md2.orange.500
    bg: "#000000"
  border_type: rounded
