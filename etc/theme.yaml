# Terminal UI theme

# default theme, using shades of blue

# display height repartition between list of diff and content of one diff
fill_factor_list: 1
fill_factor_content: 3

# default style for all content
content:
  fg: "#ABABAB" # md.ref.palette.grey70
  bg: "#000000"

bar:
  # base style for bars, headers, separators
  base:
    fg: "#FFFFFF"
    bg: "#04409F" # md.ref.palette.blue30
  # main title style
  title:
    effect: bold
  # style for key strokes
  key_stroke:
    fg: "#FFE07C" # md.ref.palette.yellow90
  # style for active view (F5/F6/F7)
  active_view:
    bg: "#1157CE" # md.ref.palette.blue40

main:
  selected_item:
    bg: "#001944" # md.ref.palette.blue10
  scroll_bar:
    fg: "#3271EA" # md.ref.palette.blue50

help:
  border_style:
    fg: "#FF8D41" # md.ref.palette.orange70
    bg: "#000000"
  border_type: rounded
  key_stroke:
    fg: "#FFE07C" # md.ref.palette.yellow90
  highlight:
    fg: "#FFFFFF"

confirm_exit:
  border_style:
    fg: "#FF8D41" # md.ref.palette.orange70
    bg: "#000000"
  border_type: rounded
